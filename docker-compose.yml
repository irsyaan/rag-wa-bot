version: "3.8"

services:
  # ── Qdrant Vector Database ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334

  # ── WhatsApp RAG Assistant ─────────────────────────────────────────────────
  wa-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    image: personal-wa-assistant:local
    container_name: personal-wa-assistant
    restart: unless-stopped
    depends_on:
      - qdrant
    env_file:
      - .env
    volumes:
      # Persist neonize session so QR login survives restarts
      - /srv/rag/personal/neonize-session:/srv/rag/personal/neonize-session
      # Persist uploaded files
      - /srv/rag/personal/uploads:/srv/rag/personal/uploads
      # Persist processed files
      - /srv/rag/personal/processed:/srv/rag/personal/processed
      # Persist logs
      - /srv/rag/personal/logs:/srv/rag/personal/logs
    extra_hosts:
      # Allow container to reach host services (MySQL, Ollama)
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
    driver: local
